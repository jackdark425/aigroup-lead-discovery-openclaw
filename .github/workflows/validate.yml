name: Validate Bundle

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate repository bundle
        run: python3 scripts/validate_bundle.py .

      - name: Prepare release bundle
        run: python3 scripts/prepare_release_bundle.py /tmp/aigroup-lead-discovery-openclaw-release

      - name: Verify npm publish payload
        run: npm pack --dry-run
